<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llama Demo - Vietnamese Summarization</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto py-10 px-4">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold text-purple-600">Llama 3.2 Demo - Tóm tắt tiếng Việt</h1>
            <a href="/" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg transition">Quay lại</a>
        </div>

        <form action="/llama_summarize" method="post" class="bg-white p-6 rounded-lg shadow-md mb-8">
            <label class="block mb-2 font-semibold">Văn bản gốc:</label>
            <textarea name="text" rows="8" class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none" placeholder="Dán văn bản cần tóm tắt vào đây...">{{ original_text }}</textarea>

            <div class="mt-4 grid grid-cols-2 gap-4">
                <div>
                    <label class="block mb-2 font-semibold">Số token tối đa:</label>
                    <input type="number" name="max_tokens" value="128" min="32" max="256" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
                </div>
                <div>
                    <label class="block mb-2 font-semibold">Temperature:</label>
                    <input type="number" name="temperature" value="0.7" min="0.1" max="1.0" step="0.1" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
                </div>
            </div>

            <button type="submit" class="w-full mt-6 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition">Tóm tắt bằng Llama</button>
        </form>

        {% if error %}
            <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-8">{{ error }}</div>
        {% endif %}

        {% if summary %}
            <div class="bg-purple-50 p-6 rounded-lg border border-purple-200">
                <h2 class="text-xl font-bold text-purple-800 mb-3">Kết quả từ Llama 3.2</h2>
                <p class="text-gray-700 leading-relaxed">{{ summary }}</p>
            </div>
        {% endif %}

        <div class="mt-8 bg-blue-50 p-6 rounded-lg border border-blue-200">
            <h2 class="text-lg font-bold text-blue-800 mb-2">Thông tin mô hình</h2>
            <ul class="text-gray-700 space-y-1">
                <li><strong>Base Model:</strong> meta-llama/Llama-3.2-1B-Instruct</li>
                <li><strong>Adapter:</strong> final-adapter (LoRA fine-tuned)</li>
                <li><strong>LoRA r:</strong> 32, alpha: 64</li>
            </ul>
        </div>
    </div>
</body>
</html>
